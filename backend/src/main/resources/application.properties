spring.application.name=backend

# ─────────────────────────────────────────────────────────────────────────────
# Database Configuration
# Local dev:  uses hardcoded defaults below (postgres/postgres/neurosense_db)
# Docker/Cloud: override by setting environment variables:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neurosense_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Allow large video uploads (walking video analysis)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Upload directory — resolved relative to backend/ working dir so any clone works
# Override with env var APP_UPLOAD_DIR for Docker/cloud
app.upload.dir=${APP_UPLOAD_DIR:${user.dir}/../uploads}

# Project root — used by prediction services to locate ml-model/ scripts
# Override with env var APP_PROJECT_DIR for Docker/cloud
app.project.dir=${APP_PROJECT_DIR:${user.dir}/..}
